<svg width="100%" height="100%" viewBox="120 0 560 360" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="250" y1="35" x2="560" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="chipBody" x1="334" y1="114" x2="466" y2="246" gradientUnits="userSpaceOnUse">
      <stop stop-color="#232826"/>
      <stop offset="1" stop-color="#101412"/>
    </linearGradient>

    <!-- muted walnut wood tones -->
    <linearGradient id="woodRing" x1="404" y1="184" x2="478" y2="258" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A8896A"/>
      <stop offset="1" stop-color="#74553D"/>
    </linearGradient>
    <linearGradient id="woodHandle" x1="468" y1="246" x2="514" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9A7657"/>
      <stop offset="0.55" stop-color="#7E5D43"/>
      <stop offset="1" stop-color="#5E4330"/>
    </linearGradient>
    <linearGradient id="woodHandleCap" x1="500" y1="280" x2="512" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#51392A"/>
      <stop offset="1" stop-color="#3E2B20"/>
    </linearGradient>
    <linearGradient id="metalJoin" x1="461" y1="241" x2="474" y2="254" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4D9DE"/>
      <stop offset="1" stop-color="#A1A9B1"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <circle cx="400" cy="180" r="150" fill="url(#bg)"/>
  <ellipse cx="400" cy="302" rx="182" ry="12" fill="#DCE3EA"/>

  <!-- chip pins -->
  <g fill="#B8C1C8">
    <!-- top -->
    <rect x="346.00" y="100.00" width="10" height="18" rx="3"/>
    <rect x="365.60" y="100.00" width="10" height="18" rx="3"/>
    <rect x="385.20" y="100.00" width="10" height="18" rx="3"/>
    <rect x="404.80" y="100.00" width="10" height="18" rx="3"/>
    <rect x="424.40" y="100.00" width="10" height="18" rx="3"/>
    <rect x="444.00" y="100.00" width="10" height="18" rx="3"/>

    <!-- bottom -->
    <rect x="346.00" y="242.00" width="10" height="18" rx="3"/>
    <rect x="365.60" y="242.00" width="10" height="18" rx="3"/>
    <rect x="385.20" y="242.00" width="10" height="18" rx="3"/>
    <rect x="404.80" y="242.00" width="10" height="18" rx="3"/>
    <rect x="424.40" y="242.00" width="10" height="18" rx="3"/>
    <rect x="444.00" y="242.00" width="10" height="18" rx="3"/>

    <!-- left -->
    <rect x="320.00" y="126.00" width="18" height="10" rx="3"/>
    <rect x="320.00" y="145.60" width="18" height="10" rx="3"/>
    <rect x="320.00" y="165.20" width="18" height="10" rx="3"/>
    <rect x="320.00" y="184.80" width="18" height="10" rx="3"/>
    <rect x="320.00" y="204.40" width="18" height="10" rx="3"/>
    <rect x="320.00" y="224.00" width="18" height="10" rx="3"/>

    <!-- right -->
    <rect x="462.00" y="126.00" width="18" height="10" rx="3"/>
    <rect x="462.00" y="145.60" width="18" height="10" rx="3"/>
    <rect x="462.00" y="165.20" width="18" height="10" rx="3"/>
    <rect x="462.00" y="184.80" width="18" height="10" rx="3"/>
    <rect x="462.00" y="204.40" width="18" height="10" rx="3"/>
    <rect x="462.00" y="224.00" width="18" height="10" rx="3"/>
  </g>

  <!-- chip body -->
  <rect x="334.00" y="114.00" width="132" height="132" rx="16" fill="url(#chipBody)"/>
  <rect x="343.00" y="123.00" width="114" height="114" rx="12" stroke="#2F5C38" stroke-width="2"/>

  <!-- inner cpu die -->
  <rect x="372.00" y="152.00" width="56" height="56" rx="8" fill="#8F98A3"/>
  <rect x="378.00" y="158.00" width="44" height="44" rx="5" stroke="#C9D0D6" stroke-width="2" opacity="0.85"/>

  <!-- walnut magnifier -->
  <g>
    <circle cx="442" cy="222" r="42" fill="#F7F8F7" stroke="url(#woodRing)" stroke-width="10"/>

    <!-- joint -->
    <rect x="468" y="248" width="14" height="10" rx="5" fill="url(#metalJoin)" transform="rotate(45 468 248)"/>

    <!-- handle -->
    <rect x="476" y="254" width="44" height="16" rx="8" fill="url(#woodHandle)" transform="rotate(45 476 254)"/>
    <rect x="506" y="284" width="10" height="16" rx="5" fill="url(#woodHandleCap)" transform="rotate(45 506 284)"/>

    <!-- lens highlight -->
    <path d="M427 204C435 196 449 194 460 199" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.68"/>
  </g>
</svg>
